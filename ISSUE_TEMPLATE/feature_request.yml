name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
assignees:
  - farhabihelal
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! ✨
        Please provide as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve? Is your feature request related to a problem?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. Be as specific as possible.
      placeholder: I would like...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: I also considered...

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What area does this feature belong to?
      options:
        - Bash Script
        - Python Script
        - Configuration File
        - Documentation
        - GitHub Template
        - Workflow / CI
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or references about the feature request.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched the existing issues and this is not a duplicate
          required: true
        - label: I have clearly described the problem and proposed solution
          required: true
